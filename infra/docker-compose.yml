# dev-team 로컬 인프라
# 로컬에서 GUI 도구(Neo4j Browser, MongoDB Compass, ARDM/RedisInsight 등 Valkey-compatible GUI)로
# 직접 관찰할 수 있도록 호스트 포트를 노출한다.
#
# 사용:
#   cp .env.example .env   # (이슈 #2에서 제공)
#   docker compose -f infra/docker-compose.yml --env-file .env up -d
name: dev-team

services:
  neo4j:
    image: neo4j:5
    container_name: dev-team-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-devteam_neo4j}"
      # 필요한 APOC 등 플러그인은 추후 init 단계에서 활성화
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"   # Browser (HTTP)
      - "${NEO4J_BOLT_PORT:-7687}:7687"   # Bolt (driver/GUI)
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  mongodb:
    image: mongo:8
    container_name: dev-team-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_INITDB_ROOT_USERNAME:-root}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_INITDB_ROOT_PASSWORD:-devteam_mongo}"
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # One-shot: Neo4j healthy 후 스키마(제약·인덱스) 적용 → 종료
  neo4j-init:
    image: neo4j:5
    container_name: dev-team-neo4j-init
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "${NEO4J_USER:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-devteam_neo4j}"
    volumes:
      - ./init/neo4j-init.sh:/init.sh:ro
    entrypoint: ["bash", "/init.sh"]
    restart: "no"

  # One-shot: MongoDB healthy 후 컬렉션·인덱스 생성 → 종료
  mongo-init:
    image: mongo:8
    container_name: dev-team-mongo-init
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_HOST: "mongodb"
      MONGO_PORT: "27017"
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_INITDB_ROOT_USERNAME:-root}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_INITDB_ROOT_PASSWORD:-devteam_mongo}"
      MONGO_APP_DB: "${MONGO_APP_DB:-dev_team}"
    volumes:
      - ./init/mongo-init.sh:/init.sh:ro
    entrypoint: ["bash", "/init.sh"]
    restart: "no"

  valkey:
    image: valkey/valkey:9
    container_name: dev-team-valkey
    restart: unless-stopped
    # AOF 영속화 활성화 — a2a-events stream 보존
    command: ["valkey-server", "--appendonly", "yes"]
    ports:
      - "${VALKEY_PORT:-6379}:6379"
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  neo4j-data:
  neo4j-logs:
  mongodb-data:
  valkey-data:
