# dev-team 로컬 인프라
# 로컬에서 GUI 도구(Neo4j Browser, DBeaver/pgAdmin 등 Postgres GUI, ARDM/RedisInsight 등 Valkey-compatible GUI)로
# 직접 관찰할 수 있도록 호스트 포트를 노출한다.
#
# 사용:
#   cp .env.example .env   # (이슈 #2에서 제공)
#   docker compose -f infra/docker-compose.yml --env-file .env up -d
name: dev-team

services:
  neo4j:
    image: neo4j:5
    container_name: dev-team-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-devteam_neo4j}"
      # 필요한 APOC 등 플러그인은 추후 init 단계에서 활성화
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"   # Browser (HTTP)
      - "${NEO4J_BOLT_PORT:-7687}:7687"   # Bolt (driver/GUI)
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # PostgreSQL (단일 인스턴스 / 2개 DB 운영)
  #   - `langgraph` DB : langgraph-api 프레임워크 전용 (checkpoint / thread / run)
  #   - `dev_team`  DB : 애플리케이션 document storage (PRD, Session/Task/Item, JSONB 활용)
  # 배경은 docs/proposal.md, 이슈 #20 참조.
  postgres:
    image: postgres:17
    container_name: dev-team-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-devteam}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-devteam_postgres}"
      # 컨테이너 최초 부팅 시 자동 생성되는 DB.
      # 애플리케이션 DB(`dev_team`) 는 postgres-init 단계에서 추가 생성.
      POSTGRES_DB: "${POSTGRES_DB:-langgraph}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-devteam}", "-d", "${POSTGRES_DB:-langgraph}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  # One-shot: Neo4j healthy 후 스키마(제약·인덱스) 적용 → 종료
  neo4j-init:
    image: neo4j:5
    container_name: dev-team-neo4j-init
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "${NEO4J_USER:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-devteam_neo4j}"
    volumes:
      - ./init/neo4j-init.sh:/init.sh:ro
    entrypoint: ["bash", "/init.sh"]
    restart: "no"

  # One-shot: Postgres healthy 후 애플리케이션 DB(`dev_team`) 생성 → 종료
  postgres-init:
    image: postgres:17
    container_name: dev-team-postgres-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      POSTGRES_USER: "${POSTGRES_USER:-devteam}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-devteam_postgres}"
      POSTGRES_DB: "${POSTGRES_DB:-langgraph}"
      APP_DB: "${APP_DB:-dev_team}"
    volumes:
      - ./init/postgres-init.sh:/init.sh:ro
    entrypoint: ["bash", "/init.sh"]
    restart: "no"

  valkey:
    image: valkey/valkey:9
    container_name: dev-team-valkey
    restart: unless-stopped
    # AOF 영속화 활성화 — a2a-events stream 보존
    command: ["valkey-server", "--appendonly", "yes"]
    ports:
      - "${VALKEY_PORT:-6379}:6379"
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ────────────────────────────────────────────────────────────────
  #  에이전트 서비스 (profile: agents)
  # ────────────────────────────────────────────────────────────────
  #  - 공통 Docker 이미지 + override config 마운트 구조 (docs/proposal.md §2.4)
  #  - 각 에이전트가 자체 FastAPI 서버로 A2A 엔드포인트 노출 (primary_agent.server:app)
  #  - 영속성: OSS langgraph-checkpoint-postgres 의 AsyncPostgresSaver 를
  #    lifespan 단계에서 DATABASE_URI 로 wiring
  #  - 호스트 포트 규약 (root CLAUDE.md "포트 컨벤션" 참조):
  #      9000~9099 에이전트 — Primary 9001 / Librarian 9002 / Architect 9003 ...
  #      9100~9199 MCP    — Document DB 9100 / IssueTracker 9101 / Wiki 9102 / Graph DB 9103
  #
  #  기동:
  #    docker compose -f infra/docker-compose.yml --env-file .env --profile agents up -d
  #    (MCP 만:  --profile mcp)

  primary:
    profiles: ["agents"]
    build:
      context: ..                                   # repo root (shared + agents/primary 포함)
      dockerfile: agents/primary/Dockerfile
    image: dev-team/primary:latest
    container_name: dev-team-primary
    restart: unless-stopped
    env_file:
      - ../.env                                     # ANTHROPIC_API_KEY 등 주입
    environment:
      # AsyncPostgresSaver 가 체크포인트를 저장할 DSN. `langgraph` DB 를 프레임워크 state 전용으로 사용.
      DATABASE_URI: "postgres://${POSTGRES_USER:-devteam}:${POSTGRES_PASSWORD:-devteam_postgres}@postgres:5432/${POSTGRES_DB:-langgraph}"
      # A2A 대화 이벤트 publish (#34) — Chronicler 가 consume.
      VALKEY_URL: "redis://valkey:6379"
    volumes:
      # Override config 마운트 — ${ANTHROPIC_API_KEY} 가 config_loader 단계에서 치환됨
      - ../overrides/primary.yaml:/app/primary/config/override.yaml:ro
    ports:
      - "9001:8000"                                 # 호스트 9001 ← 컨테이너 8000 (uvicorn)
    depends_on:
      postgres:
        condition: service_healthy
      postgres-init:
        condition: service_completed_successfully
      valkey:
        condition: service_started

  # MCP 서버군 (profile: mcp 또는 agents).
  # 모든 MCP 는 streamable HTTP transport (MCP spec 2025-06-18). 컨테이너 내부 8000.

  document-db-mcp:
    profiles: ["mcp", "agents"]
    build:
      context: ..
      dockerfile: mcp/document-db/Dockerfile
    image: dev-team/document-db-mcp:latest
    container_name: dev-team-document-db-mcp
    restart: unless-stopped
    environment:
      # dev_team DB DSN (langgraph DB 와 분리, 이슈 #20)
      DATABASE_URI: "postgres://${POSTGRES_USER:-devteam}:${POSTGRES_PASSWORD:-devteam_postgres}@postgres:5432/${APP_DB:-dev_team}"
      AUTO_MIGRATE: "true"
    ports:
      - "9100:8000"                                 # 호스트 9100 ← 컨테이너 8000
    depends_on:
      postgres:
        condition: service_healthy
      postgres-init:
        condition: service_completed_successfully

  # Chronicler (CHR) — A2A 대화 이벤트 수집 (#34).
  # 단일 Python 스크립트. 에이전트 아님 (LangGraph / LLM 미사용).

  chronicler:
    profiles: ["agents"]
    build:
      context: ..
      dockerfile: chronicler/Dockerfile
    image: dev-team/chronicler:latest
    container_name: dev-team-chronicler
    restart: unless-stopped
    environment:
      VALKEY_URL: "redis://valkey:6379"
      DOCUMENT_DB_MCP_URL: "http://document-db-mcp:8000/mcp"
      CHRONICLER_CONSUMER_GROUP: "chronicler"
      CHRONICLER_CONSUMER_NAME: "chr-1"
    depends_on:
      valkey:
        condition: service_started
      document-db-mcp:
        condition: service_started

  user-gateway:
    profiles: ["agents"]
    build:
      context: ..                                   # repo root (shared + user-gateway/*)
      dockerfile: user-gateway/Dockerfile
    image: dev-team/user-gateway:latest
    container_name: dev-team-user-gateway
    restart: unless-stopped
    environment:
      # Primary 의 A2A 엔드포인트 / AgentCard URL. compose 내부 DNS 기준.
      PRIMARY_A2A_URL: "http://primary:8000/a2a/primary"
      PRIMARY_CARD_URL: "http://primary:8000/.well-known/agent-card.json"
      # A2A 대화 이벤트 publish (#34) — UG ↔ P 양쪽 publish, CHR consume.
      VALKEY_URL: "redis://valkey:6379"
    ports:
      - "8080:8000"                                 # 호스트 8080 ← 컨테이너 8000 (브라우저 접속 경로)
    depends_on:
      primary:
        condition: service_started
      valkey:
        condition: service_started

volumes:
  neo4j-data:
  neo4j-logs:
  postgres-data:
  valkey-data:
